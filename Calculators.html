<!DOCTYPE html>
<html>
<head>
    <title>Priyu Calculator Pro</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
        }
        input {
            width: 240px;
            height: 40px;
            font-size: 20px;
            margin: 10px;
            text-align: right;
        }
        button {
            width: 55px;
            height: 45px;
            font-size: 16px;
            margin: 5px;
        }
    </style>
</head>
<body>

<h2>Priyu Calculator Pro 🔥</h2>

<input type="text" id="result" disabled><br>

<!-- Numbers -->
<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>
<button onclick="add('/')">/</button><br>

<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>
<button onclick="add('*')">*</button><br>

<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>
<button onclick="add('-')">-</button><br>

<button onclick="add('0')">0</button>
<button onclick="add('.')">.</button>
<button onclick="calculate()">=</button>
<button onclick="add('+')">+</button><br>

<!-- Advanced -->
<button onclick="sqrt()">√</button>
<button onclick="square()">x²</button>
<button onclick="log()">log</button>
<button onclick="clearDisplay()">C</button><br>

<!-- Backspace -->
<button onclick="backspace()">⌫</button>

<script>
function add(value) {
    document.getElementById("result").value += value;
}

function clearDisplay() {
    document.getElementById("result").value = "";
}

function backspace() {
    let current = document.getElementById("result").value;
    document.getElementById("result").value = current.slice(0, -1);
}

function calculate() {
    try {
        let exp = document.getElementById("result").value;
        document.getElementById("result").value = eval(exp);
    } catch {
        document.getElementById("result").value = "Error";
    }
}

function sqrt() {
    let val = parseFloat(document.getElementById("result").value);
    document.getElementById("result").value = Math.sqrt(val);
}

function square() {
    let val = parseFloat(document.getElementById("result").value);
    document.getElementById("result").value = val * val;
}

function log() {
    let val = parseFloat(document.getElementById("result").value);
    document.getElementById("result").value = Math.log10(val);
}
</script>

</body>
</html>
